name: Sync All Repos — Source → Destination

on:
  # 3:00 AM IST daily = 21:30 UTC
  schedule:
    - cron: "30 21 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — list repos without syncing"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force_sync:
        description: "Force re-sync repos that already exist on destination"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  sync:
    name: Mirror repositories
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Verify tools
        run: |
          git --version
          jq  --version
          curl --version | head -1

      # ── Fetch ALL repos (handles both user & org accounts, all pages) ─────────
      - name: Fetch source repo list
        id: list
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_GITHUB_TOKEN }}
          SOURCE_USER:  ${{ vars.SOURCE_GITHUB_USER }}
        run: |
          set -euo pipefail
          echo "Fetching repos for: $SOURCE_USER"

          # Detect whether this is a user or org account
          ACCOUNT_TYPE=$(curl -sf \
            -H "Authorization: Bearer $SOURCE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$SOURCE_USER" | jq -r '.type')

          echo "Account type: $ACCOUNT_TYPE"

          page=1
          > /tmp/source_repos.json   # start with empty file

          while true; do
            echo "  Fetching page $page ..."

            if [ "$ACCOUNT_TYPE" = "Organization" ]; then
              # Org endpoint — returns ALL repos (public + private the token can see)
              API_URL="https://api.github.com/orgs/$SOURCE_USER/repos?per_page=100&page=$page&type=all"
            else
              # User endpoint — use /user/repos when the token IS the source user
              # This returns everything including private repos
              API_URL="https://api.github.com/user/repos?per_page=100&page=$page&affiliation=owner"
            fi

            HTTP_STATUS=$(curl -s -o /tmp/page.json -w "%{http_code}" \
              -H "Authorization: Bearer $SOURCE_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API_URL")

            echo "  HTTP status: $HTTP_STATUS"

            # Bail on auth / server errors
            if [ "$HTTP_STATUS" = "401" ] || [ "$HTTP_STATUS" = "403" ]; then
              echo "ERROR: Token rejected (HTTP $HTTP_STATUS). Check SOURCE_GITHUB_TOKEN scopes."
              cat /tmp/page.json
              exit 1
            fi

            # Stop if response is not a JSON array
            if ! jq -e 'type == "array"' /tmp/page.json > /dev/null 2>&1; then
              echo "  Non-array response on page $page — stopping pagination."
              echo "  Response: $(cat /tmp/page.json)"
              break
            fi

            count=$(jq 'length' /tmp/page.json)
            echo "  Page $page: $count repos"

            # Stop on empty page
            [ "$count" -eq 0 ] && break

            # Append this page's repos into the master file
            if [ -s /tmp/source_repos.json ]; then
              # File already has content — merge arrays
              jq -s '.[0] + .[1]' /tmp/source_repos.json /tmp/page.json > /tmp/source_repos_merged.json
              mv /tmp/source_repos_merged.json /tmp/source_repos.json
            else
              cp /tmp/page.json /tmp/source_repos.json
            fi

            # Last page if fewer than 100 results
            [ "$count" -lt 100 ] && break

            page=$((page + 1))
            sleep 0.5   # be polite to the API
          done

          total=$(jq 'length' /tmp/source_repos.json)
          echo "Total repos fetched: $total"

          # Write names list for the sync step
          jq -r '.[].name' /tmp/source_repos.json > /tmp/source_repo_names.txt

          echo "--- Repo list ---"
          cat /tmp/source_repo_names.txt
          echo "-----------------"

          echo "total=$total" >> "$GITHUB_OUTPUT"

      # ── Sync every repo ───────────────────────────────────────────────────────
      - name: Sync repositories
        env:
          SOURCE_TOKEN: ${{ secrets.SOURCE_GITHUB_TOKEN }}
          DEST_TOKEN:   ${{ secrets.DEST_GITHUB_TOKEN }}
          SOURCE_USER:  ${{ vars.SOURCE_GITHUB_USER }}
          DEST_USER:    ${{ vars.DEST_GITHUB_USER }}
          DRY_RUN:      ${{ github.event.inputs.dry_run || 'false' }}
          FORCE_SYNC:   ${{ github.event.inputs.force_sync || 'false' }}
        run: |
          set -uo pipefail

          COUNT_NEW=0; COUNT_SYNCED=0; COUNT_SKIPPED=0; COUNT_FAILED=0

          SUMMARY_FILE="/tmp/sync_summary.md"
          echo "# Sync Summary — $(date -u '+%Y-%m-%d %H:%M UTC')" > "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"
          echo "| Repo | Status | Note |" >> "$SUMMARY_FILE"
          echo "|------|--------|------|" >> "$SUMMARY_FILE"

          while IFS= read -r REPO_NAME; do
            [ -z "$REPO_NAME" ] && continue

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Repo: $REPO_NAME"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            META=$(jq -r --arg n "$REPO_NAME" '.[] | select(.name==$n)' /tmp/source_repos.json)
            IS_FORK=$(echo    "$META" | jq -r '.fork')
            IS_PRIVATE=$(echo "$META" | jq -r '.private')
            IS_EMPTY=$(echo   "$META" | jq -r '.size == 0')
            DESCRIPTION=$(echo "$META" | jq -r '.description // ""')

            # Skip forks
            if [ "$IS_FORK" = "true" ]; then
              echo "  SKIP — fork"
              COUNT_SKIPPED=$((COUNT_SKIPPED + 1))
              echo "| \`$REPO_NAME\` | ⏭ Skipped | Fork |" >> "$SUMMARY_FILE"
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "  DRY RUN — would sync"
              COUNT_SKIPPED=$((COUNT_SKIPPED + 1))
              echo "| \`$REPO_NAME\` | 🔍 Dry run | Would sync |" >> "$SUMMARY_FILE"
              continue
            fi

            # Check if dest repo already exists
            DEST_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $DEST_TOKEN" \
              "https://api.github.com/repos/$DEST_USER/$REPO_NAME")

            if [ "$DEST_EXISTS" != "200" ]; then
              echo "  → Creating repo on destination..."
              # Escape description for JSON
              SAFE_DESC=$(echo "$DESCRIPTION" | jq -Rs '.')
              CREATE_BODY=$(jq -n \
                --arg name "$REPO_NAME" \
                --argjson desc "$SAFE_DESC" \
                --argjson private "$IS_PRIVATE" \
                '{name: $name, description: $desc, private: $private, auto_init: false}')

              HTTP_CODE=$(curl -s -o /tmp/create_resp.json -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $DEST_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/user/repos" \
                -d "$CREATE_BODY")

              if [ "$HTTP_CODE" != "201" ]; then
                echo "  FAILED — could not create repo (HTTP $HTTP_CODE)"
                jq -r '.message // "unknown error"' /tmp/create_resp.json
                COUNT_FAILED=$((COUNT_FAILED + 1))
                echo "| \`$REPO_NAME\` | ❌ Failed | Create error HTTP $HTTP_CODE |" >> "$SUMMARY_FILE"
                continue
              fi
              echo "  ✓ Repo created on destination"
              REPO_ACTION="new"
            else
              REPO_ACTION="sync"
            fi

            # Skip empty repos (nothing to clone)
            if [ "$IS_EMPTY" = "true" ]; then
              echo "  SKIP — repo is empty (no commits)"
              COUNT_SKIPPED=$((COUNT_SKIPPED + 1))
              echo "| \`$REPO_NAME\` | ⏭ Skipped | Empty repo |" >> "$SUMMARY_FILE"
              continue
            fi

            WORK_DIR=$(mktemp -d)
            SRC_URL="https://x-token-auth:${SOURCE_TOKEN}@github.com/${SOURCE_USER}/${REPO_NAME}.git"
            DST_URL="https://x-token-auth:${DEST_TOKEN}@github.com/${DEST_USER}/${REPO_NAME}.git"

            echo "  → Cloning (mirror)..."
            if ! git clone --mirror "$SRC_URL" "$WORK_DIR" 2>&1; then
              echo "  FAILED — git clone error"
              COUNT_FAILED=$((COUNT_FAILED + 1))
              echo "| \`$REPO_NAME\` | ❌ Failed | Clone error |" >> "$SUMMARY_FILE"
              rm -rf "$WORK_DIR"
              continue
            fi

            echo "  → Pushing to destination..."
            if ! git -C "$WORK_DIR" push --mirror "$DST_URL" 2>&1; then
              echo "  FAILED — git push error"
              COUNT_FAILED=$((COUNT_FAILED + 1))
              echo "| \`$REPO_NAME\` | ❌ Failed | Push error |" >> "$SUMMARY_FILE"
              rm -rf "$WORK_DIR"
              continue
            fi

            rm -rf "$WORK_DIR"

            if [ "$REPO_ACTION" = "new" ]; then
              echo "  ✓ NEW — created and mirrored"
              COUNT_NEW=$((COUNT_NEW + 1))
              echo "| \`$REPO_NAME\` | ✅ New | Created + mirrored |" >> "$SUMMARY_FILE"
            else
              echo "  ✓ SYNCED — branches and tags updated"
              COUNT_SYNCED=$((COUNT_SYNCED + 1))
              echo "| \`$REPO_NAME\` | 🔄 Synced | Updated |" >> "$SUMMARY_FILE"
            fi

            sleep 1

          done < /tmp/source_repo_names.txt

          echo ""
          echo "════════════════════════════════════════════"
          echo "  SYNC COMPLETE"
          echo "  New     : $COUNT_NEW"
          echo "  Synced  : $COUNT_SYNCED"
          echo "  Skipped : $COUNT_SKIPPED"
          echo "  Failed  : $COUNT_FAILED"
          echo "════════════════════════════════════════════"

          echo "" >> "$SUMMARY_FILE"
          echo "## Totals" >> "$SUMMARY_FILE"
          echo "- ✅ New: $COUNT_NEW" >> "$SUMMARY_FILE"
          echo "- 🔄 Synced: $COUNT_SYNCED" >> "$SUMMARY_FILE"
          echo "- ⏭ Skipped: $COUNT_SKIPPED" >> "$SUMMARY_FILE"
          echo "- ❌ Failed: $COUNT_FAILED" >> "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

          [ "$COUNT_FAILED" -eq 0 ] || exit 1

      - name: Upload sync summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-summary-${{ github.run_number }}
          path: /tmp/sync_summary.md
          retention-days: 30
