```yaml
name: Azure DevOps Repo Sync

on:
  workflow_dispatch:

  schedule:
    # Daily at 2 AM IST
    - cron: '30 20 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      # Reuse existing mirror cache
      - name: Cache Git Mirrors
        uses: actions/cache@v4
        with:
          path: mirrors
          key: azure-mirror-cache-v1
          restore-keys: |
            azure-mirror-cache-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq gh python3-pip

      - name: Install git-filter-repo
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade git-filter-repo

      - name: Configure Git
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          git config --global advice.detachedHead false

      - name: Create Mirrors Directory
        run: |
          mkdir -p mirrors

      - name: Fetch and Sync Azure Repositories
        env:
          AZURE_PAT: ${{ secrets.AZURE_PAT }}
          AZURE_ORG: ${{ secrets.AZURE_ORG }}
          AZURE_PROJECT: ${{ secrets.AZURE_PROJECT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

        run: |
          set -euxo pipefail

          echo "========================================"
          echo "AZURE DEVOPS REPOSITORY FETCH STARTED"
          echo "========================================"

          echo "Azure Organization : $AZURE_ORG"
          echo "Azure Project      : $AZURE_PROJECT"
          echo "GitHub Username    : $GH_USERNAME"

          ENCODED_PROJECT=$(printf '%s' "$AZURE_PROJECT" | jq -sRr @uri)

          RESPONSE=$(curl -s \
            -u :$AZURE_PAT \
            "https://dev.azure.com/$AZURE_ORG/$ENCODED_PROJECT/_apis/git/repositories?api-version=7.1")

          echo "$RESPONSE" > repos.json

          echo "========================================"
          echo "AZURE API RESPONSE"
          echo "========================================"

          if ! jq -e '.value' repos.json >/dev/null 2>&1; then
            echo "Azure API Error"
            cat repos.json
            exit 1
          fi

          REPO_COUNT=$(jq '.value | length' repos.json)

          echo "Total Repositories Found: $REPO_COUNT"

          if [ "$REPO_COUNT" -eq 0 ]; then
            echo "No repositories found."
            exit 1
          fi

          jq -c '.value[]' repos.json > repo_items.txt

          while IFS= read -r repoJson
          do

            echo ""
            echo "========================================"

            REPO_NAME=$(echo "$repoJson" | jq -r '.name')

            GITHUB_REPO_NAME=$(echo "$REPO_NAME" | \
              sed 's/[^a-zA-Z0-9._-]/-/g')

            REMOTE_URL=$(echo "$repoJson" | jq -r '.remoteUrl')

            REPO_SIZE=$(echo "$repoJson" | jq -r '.size')

            echo "Repository      : $REPO_NAME"
            echo "GitHub Repo     : $GITHUB_REPO_NAME"
            echo "Repository Size : $REPO_SIZE"

            SAFE_NAME=$(echo "$REPO_NAME" | tr ' /' '__')
            MIRROR_PATH="mirrors/$SAFE_NAME.git"

            echo "Preparing Mirror Repository..."

            if [ -d "$MIRROR_PATH" ]; then

              echo "Existing Mirror Found"

              cd "$MIRROR_PATH"

              git fetch --all --prune

              cd -

            else

              echo "Creating New Mirror"

              git -c http.extraheader="AUTHORIZATION: Basic $(printf ':%s' "$AZURE_PAT" | base64 -w0)" \
                clone --mirror "$REMOTE_URL" "$MIRROR_PATH"

            fi

            if [ ! -d "$MIRROR_PATH" ]; then
              echo "Clone Failed: $REPO_NAME"
              continue
            fi

            echo "Mirror Ready"

            echo "Checking GitHub Repository..."

            if ! gh repo view "$GH_USERNAME/$GITHUB_REPO_NAME" >/dev/null 2>&1; then

              echo "Creating GitHub Repository"

              gh repo create \
                "$GH_USERNAME/$GITHUB_REPO_NAME" \
                --private

            else

              echo "Repository Already Exists"

            fi

            cd "$MIRROR_PATH"

            echo "Removing Pull Request References"

            git for-each-ref --format='%(refname)' refs/pull/ | \
              xargs -r -n 1 git update-ref -d

            # Run cleanup only once
            if [ ! -f ".cleaned" ]; then

              echo "Cleaning Repository History"

              git filter-repo \
                --path-glob '**/.terraform/**' \
                --invert-paths \
                --force || true

              git filter-repo \
                --strip-blobs-bigger-than 95M \
                --force || true

              touch .cleaned

            else

              echo "Repository Already Cleaned"

            fi

            git remote remove github 2>/dev/null || true

            git remote add github \
              "https://$GH_USERNAME:$GH_TOKEN@github.com/$GH_USERNAME/$GITHUB_REPO_NAME.git"

            echo "========================================"
            echo "PUSHING BRANCHES"
            echo "========================================"

            git push github \
              'refs/heads/*:refs/heads/*' \
              --force \
              --prune

            echo "========================================"
            echo "PUSHING TAGS"
            echo "========================================"

            git push github \
              'refs/tags/*:refs/tags/*' \
              --force

            echo "========================================"
            echo "SYNC COMPLETED"
            echo "========================================"

            echo "Azure Repo  : $REPO_NAME"
            echo "GitHub Repo : https://github.com/$GH_USERNAME/$GITHUB_REPO_NAME"

            cd -

          done < repo_items.txt

          echo ""
          echo "========================================"
          echo "ALL REPOSITORIES SYNCED SUCCESSFULLY"
          echo "========================================"
```
