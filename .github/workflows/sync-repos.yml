name: Azure DevOps Repo Sync

on:
  workflow_dispatch:

  schedule:
    # Daily at 2 AM IST
    - cron: '30 20 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v5

      - name: Cache Git Mirrors
        uses: actions/cache@v4
        with:
          path: mirrors
          key: azure-mirror-cache-${{ github.run_id }}
          restore-keys: |
            azure-mirror-cache-

      - name: Install Required Packages
        run: |
          sudo apt update
          sudo apt install -y jq gh

      - name: Configure Git
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          git config --global advice.detachedHead false

      - name: Create Mirrors Folder
        run: |
          mkdir -p mirrors

      - name: Fetch and Sync Azure Repositories
        env:
          AZURE_PAT: ${{ secrets.AZURE_PAT }}
          AZURE_ORG: ${{ secrets.AZURE_ORG }}
          AZURE_PROJECT: ${{ secrets.AZURE_PROJECT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

        run: |
          set -euxo pipefail

          echo "========================================"
          echo "AZURE DEVOPS REPOSITORY FETCH STARTED"
          echo "========================================"

          echo "Azure Organization: $AZURE_ORG"
          echo "Azure Project: $AZURE_PROJECT"
          echo "GitHub Username: $GH_USERNAME"

          echo ""
          echo "========================================"
          echo "GITHUB AUTH TEST"
          echo "========================================"

          echo "$GH_TOKEN" | gh auth login --with-token
          gh auth status

          ENCODED_PROJECT=$(printf '%s' "$AZURE_PROJECT" | jq -sRr @uri)

          echo ""
          echo "Encoded Project: $ENCODED_PROJECT"

          RESPONSE=$(curl -s \
            -u :$AZURE_PAT \
            "https://dev.azure.com/$AZURE_ORG/$ENCODED_PROJECT/_apis/git/repositories?api-version=7.1-preview.1")

          echo "$RESPONSE" > repos.json

          echo ""
          echo "========================================"
          echo "AZURE API RESPONSE"
          echo "========================================"

          cat repos.json

          if ! jq -e '.value' repos.json >/dev/null 2>&1; then
            echo "Azure API returned an error"
            cat repos.json
            exit 1
          fi

          REPO_COUNT=$(jq '.value | length' repos.json)

          echo ""
          echo "========================================"
          echo "TOTAL REPOSITORIES FOUND: $REPO_COUNT"
          echo "========================================"

          if [ "$REPO_COUNT" -eq 0 ]; then
            echo "No repositories found"
            exit 1
          fi

          echo ""
          echo "Repositories Found:"
          jq -r '.value[].name' repos.json

          jq -c '.value[]' repos.json > repo_items.txt

          while IFS= read -r repoJson
          do
            echo ""
            echo "========================================"

            REPO_NAME=$(echo "$repoJson" | jq -r '.name')
            REMOTE_URL=$(echo "$repoJson" | jq -r '.remoteUrl')

            echo "PROCESSING REPOSITORY: $REPO_NAME"
            echo "REMOTE URL: $REMOTE_URL"

            SAFE_NAME=$(echo "$REPO_NAME" | tr ' /' '__')
            MIRROR_PATH="mirrors/$SAFE_NAME.git"

            AUTH_CLONE_URL=$(echo "$REMOTE_URL" | \
              sed "s#https://#https://:$AZURE_PAT@#")

            if [ -d "$MIRROR_PATH" ]; then

              echo "Mirror Cache Found"

              cd "$MIRROR_PATH"

              git remote -v
              git remote update

              cd -

            else

              echo "Creating New Mirror"

              git clone --mirror "$AUTH_CLONE_URL" "$MIRROR_PATH" \
                2>&1 | tee clone.log

            fi

            if [ ! -d "$MIRROR_PATH" ]; then
              echo "Clone Failed: $REPO_NAME"
              exit 1
            fi

            echo "Clone Successful"

            echo ""
            echo "Checking GitHub Repository"

            if ! gh repo view "$GH_USERNAME/$REPO_NAME" >/dev/null 2>&1; then

              echo "GitHub Repository Not Found"

              gh repo create "$GH_USERNAME/$REPO_NAME" \
                --private

              echo "Repository Created"

            else

              echo "Repository Already Exists"

            fi

            cd "$MIRROR_PATH"

            echo "Removing Pull Request References"

            git for-each-ref --format='%(refname)' refs/pull/ | \
              xargs -r -n 1 git update-ref -d

            echo "Removing Terraform Cache"

            git filter-branch --force --index-filter \
              'git rm -rf --cached --ignore-unmatch .terraform' \
              --prune-empty \
              --tag-name-filter cat \
              -- --all || true

            git remote remove github 2>/dev/null || true

            git remote add github \
              "https://$GH_USERNAME:$GH_TOKEN@github.com/$GH_USERNAME/$REPO_NAME.git"

            echo ""
            echo "========================================"
            echo "PUSHING BRANCHES"
            echo "========================================"

            git push github \
              'refs/heads/*:refs/heads/*' \
              --force \
              --verbose

            echo ""
            echo "========================================"
            echo "PUSHING TAGS"
            echo "========================================"

            git push github \
              'refs/tags/*:refs/tags/*' \
              --force \
              --verbose

            echo ""
            echo "========================================"
            echo "REPOSITORY SYNC COMPLETED"
            echo "========================================"

            echo "Azure Repository: $REPO_NAME"
            echo "GitHub Repository: https://github.com/$GH_USERNAME/$REPO_NAME"

            cd -

          done < repo_items.txt

          echo ""
          echo "========================================"
          echo "ALL REPOSITORIES SYNCED SUCCESSFULLY"
          echo "========================================"
