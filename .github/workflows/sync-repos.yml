name: Azure DevOps Repo Sync

on:

  workflow_dispatch:

  schedule:

    # Daily at 2 AM IST
    - cron: '30 20 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  sync:

    runs-on: ubuntu-latest

    timeout-minutes: 720

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:

      - name: Checkout Workflow Repository
        uses: actions/checkout@v5

      # CACHE GIT MIRRORS
      - name: Cache Git Mirrors
        uses: actions/cache@v5
        with:
          path: mirrors
          key: azure-mirror-cache-${{ github.run_id }}
          restore-keys: |
            azure-mirror-cache-

      - name: Install Required Packages
        run: |

          sudo apt update

          sudo apt install jq -y
          sudo apt install gh -y

      - name: Configure Git
        run: |

          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          git config --global advice.detachedHead false

      - name: Create Mirrors Folder
        run: |

          mkdir -p mirrors

      - name: Fetch and Sync Azure Repositories

        env:
          AZURE_PAT: ${{ secrets.AZURE_PAT }}
          AZURE_ORG: ${{ secrets.AZURE_ORG }}
          AZURE_PROJECT: ${{ secrets.AZURE_PROJECT }}

          GH_USERNAME: ${{ secrets.GH_USERNAME }}

        run: |

          set +e

          echo "========================================"
          echo "AZURE DEVOPS REPOSITORY FETCH STARTED"
          echo "========================================"

          # Encode Project Name
          ENCODED_PROJECT=$(printf '%s' "$AZURE_PROJECT" | jq -sRr @uri)

          # Fetch Azure Repositories
          RESPONSE=$(curl -s \
            -u :$AZURE_PAT \
            "https://dev.azure.com/$AZURE_ORG/$ENCODED_PROJECT/_apis/git/repositories?api-version=7.1-preview.1")

          echo "$RESPONSE" > repos.json

          # Repository Count
          REPO_COUNT=$(jq '.value | length' repos.json)

          echo ""
          echo "========================================"
          echo "TOTAL REPOSITORIES FOUND: $REPO_COUNT"
          echo "========================================"

          echo ""
          echo "FETCHED REPOSITORIES:"
          echo "----------------------------------------"

          jq -r '.value[].name' repos.json

          echo ""
          echo "========================================"
          echo "PREPARING REPOSITORY LIST"
          echo "========================================"

          # Save Repository List
          jq -c '.value[]' repos.json > repo_items.txt

          echo ""
          echo "========================================"
          echo "STARTING REPOSITORY SYNC"
          echo "========================================"

          # Process All Repositories
          while IFS= read -r repoJson
          do

            echo ""
            echo "========================================"

            # Repository Name
            REPO_NAME=$(echo "$repoJson" | jq -r '.name')

            echo "PROCESSING REPOSITORY:"
            echo "$REPO_NAME"

            echo "========================================"

            # Azure Remote URL
            REMOTE_URL=$(echo "$repoJson" | jq -r '.remoteUrl')

            echo ""
            echo "Azure Clone URL:"
            echo "$REMOTE_URL"

            # Inject PAT Into URL
            AUTH_CLONE_URL=$(echo "$REMOTE_URL" | \
              sed "s#https://[^@]*@#https://$AZURE_PAT@#")

            echo ""
            echo "Authenticated Clone URL Generated"

            # Safe Folder Name
            SAFE_NAME=$(echo "$REPO_NAME" | tr ' /' '__')

            # Mirror Path
            MIRROR_PATH="mirrors/$SAFE_NAME.git"

            echo ""
            echo "Preparing Mirror Repository..."

            # Use Cache If Exists
            if [ -d "$MIRROR_PATH" ]; then

              echo "Mirror Cache Found"

              cd "$MIRROR_PATH"

              git remote update

              cd -

            else

              echo "Creating New Mirror Cache"

              git clone --mirror "$AUTH_CLONE_URL" "$MIRROR_PATH"

            fi

            # Validate Mirror
            if [ ! -d "$MIRROR_PATH" ]; then

              echo ""
              echo "========================================"
              echo "CLONE FAILED:"
              echo "$REPO_NAME"
              echo "========================================"

              continue

            fi

            echo ""
            echo "Clone Successful"

            echo ""
            echo "Checking GitHub Repository..."

            # Check GitHub Repository
            gh repo view "$GH_USERNAME/$REPO_NAME" > /dev/null 2>&1

            REPO_EXISTS=$?

            if [ "$REPO_EXISTS" -ne 0 ]; then

              echo ""
              echo "GitHub Repository Not Found"

              echo ""
              echo "Creating GitHub Repository:"
              echo "$GH_USERNAME/$REPO_NAME"

              # Create Repository
              gh repo create "$GH_USERNAME/$REPO_NAME" \
                --private

              CREATE_STATUS=$?

              if [ "$CREATE_STATUS" -eq 0 ]; then

                echo ""
                echo "GitHub Repository Created Successfully"

              else

                echo ""
                echo "GitHub Repository Creation Failed"

                continue

              fi

            else

              echo ""
              echo "GitHub Repository Already Exists:"
              echo "$GH_USERNAME/$REPO_NAME"

            fi

            # Enter Mirror Repository
            cd "$MIRROR_PATH"

            echo ""
            echo "Removing Hidden Pull Request Refs..."

            # Remove Hidden Pull Request Refs
            git for-each-ref --format='%(refname)' refs/pull/ | \
            xargs -r -n 1 git update-ref -d

            echo ""
            echo "Removing Large Files..."

            # Remove Terraform Cache
            git filter-branch --force --index-filter \
            'git rm -rf --cached --ignore-unmatch .terraform' \
            --prune-empty --tag-name-filter cat -- --all || true

            echo ""
            echo "Removing Files Larger Than 95MB..."

            # Remove Large Files
            find . -type f -size +95M -delete || true

            echo ""
            echo "Configuring GitHub Remote..."

            # Remove Old Remote
            git remote remove github 2>/dev/null || true

            # Add GitHub Remote
            git remote add github \
            "https://$GH_USERNAME:$GH_TOKEN@github.com/$GH_USERNAME/$REPO_NAME.git"

            echo ""
            echo "Pushing Branches To GitHub..."

            # Push Branches
            git push github \
            'refs/heads/*:refs/heads/*' \
            --force

            echo ""
            echo "Pushing Tags To GitHub..."

            # Push Tags
            git push github \
            'refs/tags/*:refs/tags/*' \
            --force

            echo ""
            echo "========================================"
            echo "REPOSITORY SYNC COMPLETED"
            echo "========================================"

            echo "Azure Repository:"
            echo "$REPO_NAME"

            echo ""
            echo "GitHub Repository:"
            echo "https://github.com/$GH_USERNAME/$REPO_NAME"

            # Return Back
            cd -

          done < repo_items.txt

          echo ""
          echo "========================================"
          echo "ALL REPOSITORIES SYNCED SUCCESSFULLY"
          echo "========================================"
