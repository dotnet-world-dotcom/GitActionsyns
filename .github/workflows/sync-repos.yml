name: Azure DevOps Repo Sync

on:
  workflow_dispatch:

  schedule:
    - cron: '30 20 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Restore Git Mirror Cache
        uses: actions/cache@v4
        with:
          path: mirrors
          key: azure-mirror-cache-v1
          restore-keys: |
            azure-mirror-cache-

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq gh python3-pip

      - name: Install git-filter-repo
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade git-filter-repo

      - name: Configure Git
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          git config --global advice.detachedHead false

      - name: Create Mirrors Directory
        run: |
          mkdir -p mirrors

      - name: Fetch and Sync Azure Repositories
        env:
          AZURE_PAT: ${{ secrets.AZURE_PAT }}
          AZURE_ORG: ${{ secrets.AZURE_ORG }}
          AZURE_PROJECT: ${{ secrets.AZURE_PROJECT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

        run: |
          set -euxo pipefail

          ENCODED_PROJECT=$(printf '%s' "$AZURE_PROJECT" | jq -sRr @uri)

          RESPONSE=$(curl -s \
            -u :$AZURE_PAT \
            "https://dev.azure.com/$AZURE_ORG/$ENCODED_PROJECT/_apis/git/repositories?api-version=7.1")

          echo "$RESPONSE" > repos.json

          if ! jq -e '.value' repos.json >/dev/null 2>&1; then
            echo "Azure API Error"
            cat repos.json
            exit 1
          fi

          REPO_COUNT=$(jq '.value | length' repos.json)

          echo "Repositories Found: $REPO_COUNT"

          if [ "$REPO_COUNT" -eq 0 ]; then
            echo "No repositories found"
            exit 1
          fi

          for ((i=0; i<REPO_COUNT; i++))
          do

            repoJson=$(jq -c ".value[$i]" repos.json)

            REPO_NAME=$(jq -r '.name // empty' <<< "$repoJson")

            if [ -z "$REPO_NAME" ]; then
              echo "Skipping invalid repository entry"
              continue
            fi

            GITHUB_REPO_NAME=$(echo "$REPO_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g')

            REMOTE_URL=$(jq -r '.remoteUrl' <<< "$repoJson")

            echo "========================================"
            echo "PROCESSING: $REPO_NAME"
            echo "GITHUB REPO: $GITHUB_REPO_NAME"
            echo "========================================"

            SAFE_NAME=$(echo "$REPO_NAME" | tr ' /' '__')
            MIRROR_PATH="mirrors/$SAFE_NAME.git"

            if [ -d "$MIRROR_PATH" ]; then

              echo "Existing mirror found"

              cd "$MIRROR_PATH"

              git remote remove github 2>/dev/null || true

              git -c http.extraheader="AUTHORIZATION: Basic $(printf ':%s' "$AZURE_PAT" | base64 -w0)" \
                fetch origin --prune

              cd -

            else

              echo "Creating mirror"

              git -c http.extraheader="AUTHORIZATION: Basic $(printf ':%s' "$AZURE_PAT" | base64 -w0)" \
                clone --mirror "$REMOTE_URL" "$MIRROR_PATH"

            fi

            if [ ! -d "$MIRROR_PATH" ]; then
              echo "Failed to create mirror"
              continue
            fi

            if ! gh repo view "$GH_USERNAME/$GITHUB_REPO_NAME" >/dev/null 2>&1; then

              echo "Creating GitHub repository"

              gh repo create \
                "$GH_USERNAME/$GITHUB_REPO_NAME" \
                --private

            fi

            cd "$MIRROR_PATH"

            git for-each-ref --format='%(refname)' refs/pull/ | \
              xargs -r -n 1 git update-ref -d

            if [ ! -f ".cleaned" ]; then

              git filter-repo \
                --path-glob
